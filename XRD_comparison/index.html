<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XRD 数据分析比对</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>XRD 数据分析比对</h1>
    </header>
    <div id="mainContent">
      <aside id="leftPanel" class="side-panel">
        <div class="panel-header">变量列表</div>
        <div class="panel-content">
          <button id="importBtn" class="btn btn-primary btn-full btn-import">导入数据</button>
          <div id="variableTree"></div>
        </div>
      </aside>
      <div class="toggle-bar" id="leftToggle" title="收起/展开变量面板">&#9664;</div>
      <main id="centerPanel">
        <div id="toolbar">
          <button class="tool-btn active" data-tool="pointer" title="选择 / 拖动曲线">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 1l10 6-4 1 3 5-2 1-3-5-2 3z" fill="currentColor"/></svg>
          </button>
          <span class="tool-sep"></span>
          <button class="tool-btn" data-tool="text" title="添加文字标注">
            <svg width="16" height="16" viewBox="0 0 16 16"><text x="3" y="13" font-size="14" font-weight="700" fill="currentColor">T</text></svg>
          </button>
          <button class="tool-btn" data-tool="arrow" title="画箭头">
            <svg width="16" height="16" viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="1.5"/><polyline points="9,2 14,2 14,7" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button class="tool-btn" data-tool="line" title="画直线">
            <svg width="16" height="16" viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <span class="tool-sep"></span>
          <button class="tool-btn" id="deleteAnnoBtn" title="删除选中标注">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="tool-btn" id="clearAnnoBtn" title="清除所有标注">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
        </div>
        <div id="chart"></div>
      </main>
      <div class="toggle-bar" id="rightToggle" title="收起/展开控制面板">&#9654;</div>
      <aside id="rightPanel" class="side-panel">
        <div class="panel-header">
          <div class="ctrl-row ctrl-row-flush">
            <label>X 数据</label>
            <select id="globalXSelect" class="ctrl-select" title="选择 X 轴数据"></select>
          </div>
          <div class="ctrl-row ctrl-row-flush">
            <label>Y左标题</label>
            <input type="text" id="yLeftTitle" class="ctrl-text" placeholder="自动" title="左 Y 轴标题">
          </div>
          <div class="ctrl-row ctrl-row-flush">
            <label>Y右标题</label>
            <input type="text" id="yRightTitle" class="ctrl-text" placeholder="自动" title="右 Y 轴标题">
          </div>
        </div>
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="tabLines">线条控制</button>
          <button class="tab-btn" data-tab="tabPeaks">寻峰设置</button>
        </div>
        <div class="panel-content">
          <div class="tab-pane active" id="tabLines">
            <div id="lineControls"></div>
            <button id="addTraceBtn" class="btn btn-accent btn-full">+ 添加线条</button>
          </div>
          <div class="tab-pane" id="tabPeaks">
            <div id="peakControls"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div id="dropOverlay">
    <div class="drop-hint">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 16V4M12 4l-4 4M12 4l4 4M4 14v4a2 2 0 002 2h12a2 2 0 002-2v-4"/>
      </svg>
      <span>释放文件以导入数据</span>
    </div>
  </div>

  <div id="importModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <span>数据导入预览</span>
        <button class="btn-icon" id="closeModalBtn">&#10005;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn" id="cancelImportBtn">取消</button>
        <button class="btn btn-primary" id="confirmImportBtn">确认导入</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" multiple accept=".txt,.csv,.dat" hidden>

  <script src="js/state.js"></script>
  <script src="js/import.js"></script>
  <script src="js/variables.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/peaks.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/annotations.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
